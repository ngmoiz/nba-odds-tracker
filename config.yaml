# ─────────────────────────────────────────────────────────────
# Configuration — NBA Odds Tracker
#
# Source de vérité de tous les seuils de détection et paramètres de planning.
# Règle 0.4.7 : rien ne doit être codé en dur dans le code Python.
# ─────────────────────────────────────────────────────────────

# --- Source de données : The Odds API (section 4.1) ---
api:
  sport: basketball_wnba      # sport suivi (paramétrable pour V2, pas une constante)
  region: us                  # région des bookmakers
  markets:                    # marchés collectés (coût quota = nb marchés × nb régions)
    - h2h                     # moneyline (vainqueur sec)
    - spreads                 # handicap
    - totals                  # over / under
  odds_format: decimal        # format des cotes

# --- Affichage (section 5) ---
display:
  timezone: Europe/Paris      # fuseau d'affichage ; la base stocke toujours en UTC

# --- Budget quota API (section 4.3) ---
quota:
  monthly_credits: 500        # plafond du plan gratuit
  cost_per_collection: 3      # 3 marchés × 1 région
  target_collections_per_day: 5
  reserve: 50                 # garde de réserve : skip des collectes non essentielles sous ce seuil

# --- Planning de collecte (section 4.3) ---
# Le planning est AUTO-ORDONNANCÉ (Lot 2) : un seul battement cron `*/20` (voir
# `scripts/setup_cron.sh`) ; le collecteur décide lui-même, à chaque tick, quoi
# collecter. Les cibles (matin, H-6, H-3, verdict, re-décision, clôture), leurs
# marchés et priorités sont définis plus bas dans `collector.targets`.
# (L'ancien bloc `schedule:` à créneaux fixes — morning/afternoon/hours_before_tipoff/
# h1_split_blocks — a été retiré : il n'était plus lu par le code.)

# --- Moteur de règles de détection (section 6.2) ---
# Chaque règle déclenchée ajoute des points au score de signal du match/sélection.
# Les seuils chiffrés de R5 et R7 seront formalisés à l'étape 1.3 (analyseur).
rules:
  R1_spread_line_move:
    threshold_points: 2.0     # |ligne actuelle − ligne d'ouverture| ≥ 2.0 points
    score: 3
  R2_steam_move:
    threshold_prob_pct: 5.0   # variation de probabilité implicite ≥ 5 %
    window_hours: 3           # sur une fenêtre ≤ 3 h
    score: 3
  R3_sustained_trend:
    min_consecutive_snapshots: 3  # même direction sur ≥ 3 relevés consécutifs
    score: 2
  R4_multi_bookmaker_sync:
    min_bookmakers: 4         # ≥ 4 bookmakers sur 5 dans le même sens
    score: 3
  R5_cross_market_coherence:  # confirmation : spread ET moneyline bougent dans le même sens
    min_spread_move_points: 1.0  # mouvement du spread consensus depuis l'ouverture ≥ 1.0 pt
    min_prob_move_pct: 3.0       # variation de proba moneyline dé-margée du consensus ≥ 3 %
    score: 2
  R6_bookmaker_divergence:
    threshold_prob_pct: 7.0   # un book s'écarte de ≥ 7 % (proba) du consensus → ANOMALIE
    score: 2
  R7_spread_moneyline_inconsistency:  # V1 : contradiction de favori chez un même book
    min_prob_gap_pct: 3.0     # écart de proba moneyline entre les deux issues ≥ 3 %
    min_abs_spread: 1.5       # |spread| ≥ 1.5 (exclut les pick'em)
    score: 2                  # → oriente vers ANOMALIE
    # Évolution V1.1 (voir journal) : comparer la proba moneyline à la proba implicite
    # du spread via Φ(spread/σ), σ configurable par ligue (~11.5 NBA).

  # Seuils de « mouvement négligeable » (quasi stable) pour le formatage des alertes.
  # En dessous, un mouvement est réel mais pas actionnable : la conclusion
  # « l argent va vers » est remplacée par « quasi stable » (ampleur affichée).
  movement_negligible_prob: 0.002   # 0,2 pt de proba (h2h/totals)
  movement_negligible_line: 0.25     # 0,25 pt de ligne (spreads)

# --- Décision finale à H-1 (section 6.4) ---
decision:
  signal_score_threshold: 6   # score ≥ 6 ET cohérence globale → SIGNAL
  window_hours: 2.5           # verdict produit si le tip-off est dans cette fenêtre (borne inclusive)

# --- Notificateur Telegram (section 7) ---
# Le notificateur lit les alertes/verdicts non envoyés en base et les pousse sur
# Telegram. NO_BET reste enregistré en base pour l'évaluation des faux négatifs,
# mais n'est pas listé ici : il ne génère donc aucun message (évite le flux
# quotidien de « rien à signaler »).
notifier:
  verdicts_notified:          # types de verdict effectivement envoyés sur Telegram
    - SIGNAL
    - ANOMALIE
  verdicts_with_buttons:      # verdicts recevant les boutons de position (traités en 1.5)
    - SIGNAL
    - ANOMALIE

# --- Source des résultats finaux : balldontlie (section 12, journal) ---
# Réservée aux scores officiels (l'évaluateur), jamais aux cotes.
results:
  provider: balldontlie
  base_url: https://api.balldontlie.io
  # Chemin balldontlie par ligue : le namespace est dans le CHEMIN, pas un paramètre.
  # Le chemin est sélectionné automatiquement selon api.sport (règle 0.4.7).
  games_paths:
    basketball_nba:  /v1/games        # namespace NBA
    basketball_wnba: /wnba/v1/games   # namespace WNBA
  # Fuseau de référence des dates de match côté balldontlie (calendrier US).
  calendar_timezone: America/New_York

# --- Évaluateur (étape 1.6) ---
evaluator:
  lookback_days: 3            # fenêtre de rattrapage des matchs clos non encore évalués
  weekly_report_weekday: 0   # jour du rapport hebdo (0 = lundi) — implémenté après le bilan quotidien

# --- Collecteur auto-ordonnancé (Lot 2, architecture par vague) ---
collector:
  tick_interval_minutes: 20   # battement cron (72 exécutions/jour)
  wave_grouping_minutes: 45   # seuil de groupement des matchs en vagues
  targets:
    # Matin quotidien (09:00, inconditionnel)
    - name: morning
      hours_before: null      # Pas lié aux vagues (horaire fixe)
      markets: [h2h, spreads, totals]
      priority: 2
    # H-6 (6h avant tip-off le plus précoce de la vague)
    - name: h6
      hours_before: 6.0
      markets: [h2h, spreads, totals]
      priority: 2
    # H-3 (3h avant tip-off le plus précoce)
    - name: h3
      hours_before: 3.0
      markets: [h2h, spreads, totals]
      priority: 3
    # H-2 (verdict, 2h avant tip-off le plus précoce)
    - name: verdict
      hours_before: 2.0
      markets: [h2h, spreads, totals]
      priority: 1             # Jamais bloqué par la garde de réserve
    # H-1 (re-décision, 1h avant tip-off le plus précoce)
    - name: redecision
      hours_before: 1.0
      markets: [h2h, spreads, totals]
      priority: 1             # Jamais bloqué
    # H-0.4 (clôture, 24 min avant tip-off de CHAQUE match)
    # ⚠️ Fenêtre (24 min) > tick_interval_minutes (20 min) : contrainte VALIDÉE au
    # démarrage (validate_collector_config). À 0.25 (15 min < 20), les tip-offs à
    # minute ronde (:00/:20/:40) n'étaient jamais captés (simulation 2026-07-18).
    - name: closing
      hours_before: 0.4
      markets: dynamic        # Union des marchés des verdicts
      priority: 1             # Jamais bloqué
      per_match: true         # Cible calculée par match (pas sur earliest)
